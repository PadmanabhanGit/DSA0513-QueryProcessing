version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ai_query_optimizer
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  web:
    build: .
    command: bash -c "python train_model.py && python app.py"
    ports:
      - '5000:5000'
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: ai_query_optimizer
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  db_data:
